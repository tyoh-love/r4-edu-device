# Mosquitto — Phase 1 dev/prod-faithful config.
# Dev demo: anonymous on the LAN. For real deployment, flip allow_anonymous to
# false, enable the passwd + aclfile below (per-device user/pass + topic ACLs),
# and add a TLS listener on 8883 (see docs/README.md §6.5 / §7).

listener 1883
allow_anonymous true

# MQTT-over-WebSocket (handy if a browser ever talks MQTT directly)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

# --- Per-device security (enable for production) ---
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/aclfile

# --- TLS (production; R4 supports server-auth TLS on 8883) ---
# listener 8883
# cafile   /mosquitto/config/ca.crt
# certfile /mosquitto/config/server.crt
# keyfile  /mosquitto/config/server.key
